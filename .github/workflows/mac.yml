name: OSX Chrome, Firefox and Edge
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '24.x'
    - name: Install browsertime
      run: npm ci
    - name: Install python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        brew update
        brew install google-chrome
        brew install --cask firefox
        brew install --cask microsoft-edge
    - name: Test Chrome
      run: ./bin/browsertime.js -b chrome -n 1 https://www.sitespeed.io/
    - name: Test Firefox
      run: ./bin/browsertime.js -b firefox -n 1 https://www.sitespeed.io/
    - name: Test Edge
      run: ./bin/browsertime.js -b edge -n 1 https://www.sitespeed.io/
