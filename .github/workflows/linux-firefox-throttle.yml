name: Linux browsers Firefox throttle
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '24.x'
        cache: 'npm'
    - name: Install Firefox
      uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8 # latest
      with:
        firefox-version: '149.0'
    - name: Install Browsertime
      run: npm ci
    - name: Install ffmpeg
      uses: AnimMouse/setup-ffmpeg@ae28d57dabbb148eff63170b6bf7f2b60062cbae # v1.2.3
      with:
        version: '7.1'
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        sudo apt-get install net-tools -y
        python -m pip install --upgrade pip setuptools==70.0.0 pyssim OpenCV-Python Numpy virtualenv
        sudo modprobe ifb numifbs=1
    - name: Browser versions
      run: |
        firefox --version
    - name: Start local HTTP server
      run: (npm run start-server&)
    # - run: VTENV_OPTS="-p python3" make test
    - name: Test Firefox with throttle
      run: ./bin/browsertime.js -b firefox -n 1 http://127.0.0.1:3000/simple/ --connectivity.profile cable --connectivity.engine throttle --xvfb
